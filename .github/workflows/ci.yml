name: Backend CI - Build & Test

on:
  push:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - "feature/**"
      - "hotfix/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet publish MyPortfolio.csproj -c Release -o publish --no-restore

      - name: Run unit tests
        run: dotnet test MyPortfolio.Tests --no-restore
